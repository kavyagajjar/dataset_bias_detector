name: CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  release:
    types: [published]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ruff black mypy
          pip install -e .

      - name: Run ruff
        run: ruff check bias_auditor/

      - name: Run black
        run: black --check bias_auditor/ tests/

      # Advisory only: the codebase has ~70 outstanding mypy errors.
      # Remove continue-on-error once they are fixed.
      - name: Run mypy (advisory)
        continue-on-error: true
        run: mypy bias_auditor/ --ignore-missing-imports

  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.9', '3.10', '3.11', '3.12']
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      
      - name: Run tests
        run: |
          pytest tests/ -v --cov=bias_auditor --cov-report=xml --cov-report=term-missing
      
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          file: ./coverage.xml
          fail_ci_if_error: false

  integration-test:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[all]"
      
      - name: Run integration tests
        run: |
          # Test CLI
          bias-auditor --help
          
          # Test basic audit
          python -c "
          import pandas as pd
          import numpy as np
          from bias_auditor import BiasAuditor
          
          np.random.seed(42)
          df = pd.DataFrame({
              'gender': np.random.choice(['male', 'female'], 200),
              'approved': np.random.choice([0, 1], 200),
          })
          
          auditor = BiasAuditor(
              protected_attributes=['gender'],
              target_column='approved',
              verbose=False
          )
          report = auditor.audit(df)
          print(f'Audit completed: {len(report.findings)} findings')
          assert len(report.findings) >= 0
          "
          
          # Test visualization import
          python -c "
          from bias_auditor.visualizations import BiasVisualizer
          print('Visualizations module loaded successfully')
          "

  build:
    runs-on: ubuntu-latest
    needs: [lint, test]
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip
          pip install build twine
      
      - name: Build package
        run: python -m build
      
      - name: Check package
        run: twine check dist/*
      
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish:
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'release'
    environment: pypi
    permissions:
      id-token: write
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
